# GitHub Secret Scanning configuration
# Docs: https://docs.github.com/en/code-security/secret-scanning

# All paths are scanned by default.
# Add paths here ONLY to exclude generated/test fixtures that contain fake secrets.
paths-ignore:
  - '.env.example'        # contains placeholder values, not real secrets
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/stress-test*.mjs'
